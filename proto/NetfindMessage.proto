syntax = "proto3";

enum MessageType {
	PUB = 0;
	SUB = 1;
	GET = 2;
	DEL = 3;
	UNSUB = 4;
	LWT = 5;
}

enum PublishMode {
	SEND = 0;
	RETAIN = 1;
	PERSIST = 2;
	APPEND = 3;
}

message NetfindMessage {
	optional MessageType type = 1;
	optional string topic = 2;
	optional string value = 3;
	optional uint64 created_at = 4;
	optional uint64 updated_at = 5;
	optional PublishMode mode = 6;
}

message NetfindMessageList {
	repeated NetfindMessage messages = 1;
}
